name: Keep Render Backend Awake
on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend health endpoint
        run: |
          curl -fsS https://wisp-js-0nma.onrender.com/actuator/health || true
